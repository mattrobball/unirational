name = "BConicBundleMultisections"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["BConicBundleMultisections"]
lintDriver = "batteries/runLinter"
lintDriverArgs = ["BConicBundleMultisections"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.32.1"

[[lean_lib]]
name = "BConicBundleMultisections"
